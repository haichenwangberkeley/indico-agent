<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CERN Indico Meeting Portal</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/index.css">
</head>
<body>
  <div class="glow-container">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <header>
    <div class="header-content">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <h1>Indico Meeting Portal</h1>
      </div>
      <p class="subtitle">Access your primary CERN meetings, Zoom rooms, and contribution schedules</p>
      <div id="last-updated" class="last-updated">Loading...</div>
    </div>
  </header>

  <main class="container">
    <div class="control-panel">
      <form id="add-category-form" class="input-group">
        <input type="text" id="category-url" placeholder="Enter CERN Indico Category URL or ID (e.g., https://indico.cern.ch/category/18927/)" required>
        <button type="submit" id="add-category-btn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Category
        </button>
      </form>
      <div id="add-error" class="add-error hidden"></div>
    </div>

    <div id="loading" class="state-container">
      <div class="spinner"></div>
      <p>Fetching latest meeting data from CERN Indico...</p>
    </div>

    <div id="error" class="state-container hidden">
      <div class="error-icon">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <h2>Sync Failed</h2>
      <p id="error-msg">Unable to load Indico meetings.</p>
      <button id="retry-btn" class="btn btn-primary">Try Again</button>
    </div>

    <div id="portal-content" class="portal-grid hidden">
      <!-- Categories will be rendered here -->
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>CERN Indico Briefing Agent &bull; built by Haichen Wang haichenwang@berkeley.edu</p>
    </div>
  </footer>

  <script src="/static/index.js"></script>
</body>
</html>
